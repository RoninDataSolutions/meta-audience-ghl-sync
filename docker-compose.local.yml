services:
  postgres:
    image: postgres:16-alpine
    container_name: ghl-meta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: syncuser
      POSTGRES_PASSWORD: syncpass
      POSTGRES_DB: ghl_meta_sync
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syncuser -d ghl_meta_sync"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ghl-meta-sync
    restart: unless-stopped
    ports:
      - "9876:9876"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
